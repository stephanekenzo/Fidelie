<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fidélie"/>
<title>Fidélie Hôtel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1a1a2e}
input,select,button,textarea{font-family:inherit;font-size:14px}
.hide{display:none!important}

/* Header */
#header{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:16px 18px 12px;color:#fff;position:sticky;top:0;z-index:100}
#header h1{font-size:18px;font-weight:800}
#header small{font-size:10px;opacity:.6;letter-spacing:2px;text-transform:uppercase}
#header .occ{font-size:13px;font-weight:700;color:#fbbf24}

/* Tabs */
#tabs{background:#fff;border-bottom:1px solid #f0f0f0;display:flex;overflow-x:auto;position:sticky;top:68px;z-index:99}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:10px 13px;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af;font-size:11px;font-weight:500;text-align:center;position:relative}
.tab-btn.active{border-bottom-color:#1a1a2e;color:#1a1a2e;font-weight:700}
.tab-btn .badge{position:absolute;top:5px;right:3px;background:#ef4444;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Content */
#content{padding:14px;padding-bottom:60px;max-width:500px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* Cards */
.card{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:10px}
.card:active{background:#f9fafb}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{border-radius:12px;padding:12px 8px;text-align:center}
.stat .val{font-size:22px;font-weight:800}
.stat .lbl{font-size:11px;font-weight:600}

/* Grid chambres */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.ch-card{border:2px solid #e5e7eb;border-radius:12px;padding:11px;background:#fff}
.ch-card.occ{border-color:#fca5a5;background:#fff5f5}
.ch-card.maint{border-color:#fde68a;background:#fffbeb}

/* Badges */
.badge-s{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-libre{background:#d1fae5;color:#065f46}
.b-occ{background:#fee2e2;color:#991b1b}
.b-maint{background:#fef3c7;color:#92400e}
.b-conf{background:#d1fae5;color:#065f46}
.b-att{background:#fef3c7;color:#92400e}
.b-ann{background:#fee2e2;color:#991b1b}
.b-cin{background:#dbeafe;color:#1e40af}
.b-cout{background:#f3f4f6;color:#374151}

/* Filtres */
.filtres{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filtres::-webkit-scrollbar{display:none}
.filtre-btn{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:2px solid #e5e7eb;background:transparent;color:#6b7280;font-size:11px;font-weight:700;cursor:pointer}
.filtre-btn.active{border-color:#1a1a2e;background:#1a1a2e;color:#fff}

/* Boutons */
.btn{border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-full{width:100%;display:block;text-align:center}
.btn-dark{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.btn-green{background:#059669;color:#fff;border-color:#059669}
.btn-red{background:#dc2626;color:#fff;border-color:#dc2626}
.btn-blue{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.btn-purple{background:#7c3aed;color:#fff;border-color:#7c3aed}
.btn-out-dark{background:transparent;color:#1a1a2e;border-color:#1a1a2e}
.btn-out-red{background:transparent;color:#dc2626;border-color:#dc2626}
.btn-out-yellow{background:transparent;color:#f59e0b;border-color:#f59e0b}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* Forms */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 11px;font-size:14px;outline:none;background:#fff;-webkit-appearance:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.form-span{grid-column:1/-1}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(10,15,30,.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal-bg.open{display:flex}
#modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:20px}
#modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1}
#modal-header h3{font-size:16px;font-weight:800}
#modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1}
#modal-body{padding:16px 20px}

/* Recap box */
.recap{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:12px;margin-bottom:12px}
.recap-row{display:flex;justify-content:space-between;align-items:center}
.recap-row+.recap-row{border-top:1px solid #bbf7d0;margin-top:8px;padding-top:8px}

/* Alerte */
.alerte{border-radius:10px;padding:12px;margin-bottom:10px}
.alerte-green{background:#d1fae5;border:2px solid #6ee7b7}
.alerte-red{background:#fee2e2;border:2px solid #fca5a5}
.alerte-yellow{background:#fef3c7;border:2px solid #fde68a}
.alerte-crimson{background:#fff1f2;border:2px solid #fecdd3}
.alerte h4{font-size:13px;font-weight:700;margin-bottom:6px}
.alerte p{font-size:12px}

/* Caisse cards */
.caisse-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.caisse-card{border-radius:14px;padding:15px;color:#fff}
.cc1{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.cc2{background:linear-gradient(135deg,#065f46,#047857)}
.caisse-card small{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:1px}
.caisse-card .amount{font-size:20px;font-weight:800;margin-top:4px}
.caisse-card .sub{font-size:10px;opacity:.5;margin-top:2px}

/* Type chips */
.type-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-chip{border-radius:10px;padding:10px 12px}
.type-chip .lbl{font-size:11px;font-weight:700;color:#374151}
.type-chip .val{font-size:15px;font-weight:800;color:#1a1a2e}

/* Tx row */
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border-radius:10px;margin-bottom:6px}
.tx-row .tx-desc{font-weight:600;font-size:13px}
.tx-row .tx-meta{font-size:11px;color:#6b7280}
.tx-row .tx-amt{font-weight:800;font-size:14px;color:#059669;white-space:nowrap}

/* Bar menu */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.menu-item{border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;cursor:pointer;background:#fff;display:flex;justify-content:space-between;align-items:center}
.menu-item:active{background:#f5f3ff}
.plus{font-size:20px;color:#7c3aed;font-weight:800}

/* Commande */
.commande-box{background:#faf5ff;border:2px solid #ddd6fe;border-radius:12px;padding:14px;margin-bottom:14px}
.cmd-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cmd-ctrl{display:flex;align-items:center;gap:8px}
.cmd-btn{background:#ede9fe;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;font-weight:700;font-size:16px}
.cmd-total{border-top:1.5px solid #ddd6fe;margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;font-weight:800}

/* Stock bar */
.stock-bar{background:#f3f4f6;border-radius:4px;height:6px;margin:6px 0 2px}
.stock-fill{height:100%;border-radius:4px}

/* Detail rows */
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.detail-row .dk{color:#6b7280}.detail-row .dv{font-weight:700}

/* Search */
.search-input{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 11px;font-size:14px;outline:none;background:#fff;margin-bottom:12px}

/* Cal */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav button{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 12px;color:#374151}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-lbl{text-align:center;font-size:10px;font-weight:700;color:#9ca3af;padding:4px 0}
.cal-day{border-radius:8px;min-height:42px;padding:5px 3px;text-align:center;border:1.5px solid #f0f0f0;background:#f9fafb}
.cal-day.today{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.cal-day.occ{background:#dbeafe;border-color:#93c5fd}
.cal-day .d-num{font-size:12px;font-weight:700}
.cal-day .d-occ{font-size:10px;font-weight:700;color:#1e40af}
.cal-day.today .d-occ{color:#93c5fd}

/* Chambre selector */
.ch-sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:6px;max-height:175px;overflow-y:auto;padding:2px}
.ch-sel-btn{border-radius:8px;padding:6px 4px;text-align:center;border:2px solid #e5e7eb;background:#fff;cursor:pointer}
.ch-sel-btn.selected{border-color:#059669;background:#d1fae5}
.ch-sel-btn.taken{opacity:.4;cursor:not-allowed}
.ch-sel-btn .cn{font-size:13px;font-weight:800}
.ch-sel-btn .ct{font-size:9px;color:#6b7280}
.ch-sel-btn .cp{font-size:10px;font-weight:700;color:#9ca3af}
.ch-sel-btn.selected .cp{color:#059669}

</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <small>Fidélie Hôtel · Kribi</small>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
    <h1>Gestion Hôtel</h1>
    <div style="text-align:right">
      <div style="font-size:10px;opacity:.6" id="h-date"></div>
      <div style="font-size:13px;margin-top:2px">Occ: <span class="occ" id="h-occ">0</span>/27</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="goTab('chambres')" id="tb-chambres">🛏️<br>Chambres</button>
  <button class="tab-btn" onclick="goTab('reservations')" id="tb-reservations">📋<br>Réservations<span class="badge hide" id="badge-rez">0</span></button>
  <button class="tab-btn" onclick="goTab('bar')" id="tb-bar">🍽️<br>Bar & Resto</button>
  <button class="tab-btn" onclick="goTab('caisse')" id="tb-caisse">💰<br>Caisse</button>
  <button class="tab-btn" onclick="goTab('clients')" id="tb-clients">👥<br>Clients</button>
  <button class="tab-btn" onclick="goTab('stock')" id="tb-stock">📦<br>Stock<span class="badge hide" id="badge-stock">0</span></button>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- PAGE CHAMBRES -->
  <div class="page active" id="page-chambres">
    <div class="stats">
      <div class="stat" style="background:#d1fae5"><div class="val" style="color:#065f46" id="s-libres">27</div><div class="lbl" style="color:#065f46">Libres</div></div>
      <div class="stat" style="background:#fee2e2"><div class="val" style="color:#991b1b" id="s-occ">0</div><div class="lbl" style="color:#991b1b">Occupées</div></div>
      <div class="stat" style="background:#ede9fe"><div class="val" style="color:#5b21b6">27</div><div class="lbl" style="color:#5b21b6">Total</div></div>
    </div>
    <div class="filtres" id="ch-filtres">
      <button class="filtre-btn active" onclick="setCFiltre('tous',this)">Toutes</button>
      <button class="filtre-btn" onclick="setCFiltre('libre',this)">Libre</button>
      <button class="filtre-btn" onclick="setCFiltre('occupée',this)">Occupée</button>
      <button class="filtre-btn" onclick="setCFiltre('maintenance',this)">Maintenance</button>
    </div>
    <div class="ch-grid" id="ch-grid"></div>
  </div>

  <!-- PAGE RESERVATIONS -->
  <div class="page" id="page-reservations">
    <div id="rez-alertes"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-green" onclick="openRezForm()">+ Nouvelle réservation</button>
      <div style="margin-left:auto;display:flex;gap:4px">
        <button class="btn btn-dark btn-sm" id="vbtn-liste" onclick="setRezView('liste')">📋</button>
        <button class="btn btn-out-dark btn-sm" id="vbtn-cal" onclick="setRezView('cal')">📆</button>
      </div>
    </div>
    <div id="rez-liste-view">
      <input class="search-input" placeholder="🔍 Chercher client ou chambre..." oninput="filterRez(this.value)" id="rez-search"/>
      <div class="filtres" id="rez-filtres">
        <button class="filtre-btn active" onclick="setRFiltre('tous',this)">Tous</button>
        <button class="filtre-btn" onclick="setRFiltre('confirmée',this)">Confirmée</button>
        <button class="filtre-btn" onclick="setRFiltre('en attente',this)">En attente</button>
        <button class="filtre-btn" onclick="setRFiltre('check-in',this)">Check-in</button>
        <button class="filtre-btn" onclick="setRFiltre('check-out',this)">Check-out</button>
        <button class="filtre-btn" onclick="setRFiltre('annulée',this)">Annulée</button>
      </div>
      <div id="rez-list"></div>
    </div>
    <div id="rez-cal-view" class="hide">
      <div class="cal-nav">
        <button onclick="calPrev()">‹</button>
        <strong id="cal-title"></strong>
        <button onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- PAGE BAR -->
  <div class="page" id="page-bar">
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group"><label>Table / Client</label><input id="bar-table" placeholder="Table 3..."/></div>
      <div class="form-group"><label>Serveur</label><select id="bar-employe"></select></div>
    </div>
    <div class="filtres" id="bar-cats"></div>
    <div class="menu-grid" id="menu-grid"></div>
    <div id="cmd-box" class="hide">
      <div class="commande-box">
        <div style="font-weight:700;color:#5b21b6;margin-bottom:10px">🧾 Commande en cours</div>
        <div id="cmd-items"></div>
        <div class="cmd-total"><span>TOTAL</span><span id="cmd-total-amt" style="color:#059669"></span></div>
        <button class="btn btn-green btn-full" style="margin-top:10px" onclick="validerCommande()">✅ Valider & Encaisser</button>
      </div>
    </div>
    <div id="bar-histo"></div>
  </div>

  <!-- PAGE CAISSE -->
  <div class="page" id="page-caisse">
    <div class="caisse-cards">
      <div class="caisse-card cc1"><small>Aujourd'hui</small><div class="amount" id="c-jour">0 F</div><div class="sub" id="c-jour-nb">0 transaction(s)</div></div>
      <div class="caisse-card cc2"><small>Ce mois</small><div class="amount" id="c-mois">0 F</div></div>
    </div>
    <div class="type-chips" id="type-chips"></div>
    <button class="btn btn-dark btn-full" style="margin-bottom:14px" onclick="openCaisseForm()">+ Ajouter une recette</button>
    <div id="tx-list"></div>
  </div>

  <!-- PAGE CLIENTS -->
  <div class="page" id="page-clients">
    <input class="search-input" placeholder="🔍 Rechercher un client..." oninput="filterClients(this.value)" id="cl-search"/>
    <div id="cl-list"></div>
  </div>

  <!-- PAGE STOCK -->
  <div class="page" id="page-stock">
    <div id="stock-alertes"></div>
    <button class="btn btn-dark btn-full" style="margin-bottom:12px" onclick="openStockForm()">+ Nouvel article</button>
    <div id="stock-list"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal-bg" onclick="closeModalBg(event)">
  <div id="modal">
    <div id="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button id="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────
const CHAMBRES = Array.from({length:27},(_,i)=>{
  const num=101+i; let prix=15000,type="Standard";
  if(num===117){prix=45000;type="Suite";}
  if(num===121){prix=20000;type="VIP";}
  return {num,prix,type,statut:"libre"};
});
const EMPLOYES=["Réception","Mamadou","Clarisse","Roger"];
const SOURCES=["Direct / Téléphone","WhatsApp","Site web","Walk-in","Agence"];
const MENU=[
  {id:1,cat:"Plats",nom:"Poulet DG",prix:3500},
  {id:2,cat:"Plats",nom:"Poisson braisé",prix:4000},
  {id:3,cat:"Plats",nom:"Ndolé",prix:2500},
  {id:4,cat:"Plats",nom:"Eru",prix:2500},
  {id:5,cat:"Plats",nom:"Riz sauté",prix:1500},
  {id:6,cat:"Boissons",nom:"Bière 33cl",prix:800},
  {id:7,cat:"Boissons",nom:"Eau minérale",prix:500},
  {id:8,cat:"Boissons",nom:"Jus naturel",prix:1000},
  {id:9,cat:"Boissons",nom:"Cocktail",prix:2000},
  {id:10,cat:"Boissons",nom:"Vin rouge",prix:3000},
];
let STOCK=[
  {id:1,nom:"Savon de bain",qte:80,seuil:20,unite:"pcs"},
  {id:2,nom:"Shampoing",qte:60,seuil:15,unite:"pcs"},
  {id:3,nom:"Papier toilette",qte:120,seuil:30,unite:"roul."},
  {id:4,nom:"Détergent linge",qte:25,seuil:5,unite:"kg"},
  {id:5,nom:"Eau de Javel",qte:15,seuil:3,unite:"L"},
  {id:6,nom:"Serviettes bain",qte:55,seuil:20,unite:"pcs"},
  {id:7,nom:"Draps (jeux)",qte:40,seuil:15,unite:"jeux"},
  {id:8,nom:"Désinfectant",qte:8,seuil:2,unite:"L"},
];

let reservations=[], transactions=[], commande=[], barHisto=[];
let cFiltre="tous", rFiltre="tous", rSearch="", clSearch="";
let barCat="Tous", calY=new Date().getFullYear(), calM=new Date().getMonth();
let currentModalAction=null, editRezId=null, editStockId=null;

// ── Helpers ───────────────────────────────────────────────────────
const fmt=n=>Number(n).toLocaleString("fr-FR")+" F";
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>d?new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";
const diffDays=(a,b)=>Math.ceil((new Date(b)-new Date(a))/86400000);
const addDays=(d,n)=>{const r=new Date(d+"T12:00:00");r.setDate(r.getDate()+n);return r.toISOString().split("T")[0];};
const opt=(arr,sel="")=>arr.map(e=>`<option value="${e}" ${e===sel?"selected":""}>${e}</option>`).join("");
const getStatut=ch=>{const a=reservations.find(r=>r.chambre===ch.num&&r.statut==="check-in");return a?"occupée":ch.statut;};
const badgeCls={libre:"b-libre",occupée:"b-occ",maintenance:"b-maint",confirmée:"b-conf","en attente":"b-att",annulée:"b-ann","check-in":"b-cin","check-out":"b-cout"};
const badge=(s)=>`<span class="badge-s ${badgeCls[s]||'b-att'}">${s}</span>`;
const typeColors={Chambre:"#dbeafe",Restaurant:"#d1fae5",Bar:"#ede9fe",Divers:"#f3f4f6"};
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

// ── Init ──────────────────────────────────────────────────────────
function init(){
  document.getElementById("h-date").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
  document.getElementById("bar-employe").innerHTML=opt(EMPLOYES);
  renderAll();
}

function renderAll(){
  updateHeader();
  renderChambres();
  renderReservations();
  renderBar();
  renderCaisse();
  renderClients();
  renderStock();
}

// ── Header ────────────────────────────────────────────────────────
function updateHeader(){
  const occ=CHAMBRES.filter(c=>getStatut(c)==="occupée").length;
  document.getElementById("h-occ").textContent=occ;
  const att=reservations.filter(r=>r.statut==="en attente").length;
  const bRez=document.getElementById("badge-rez");
  bRez.textContent=att; att>0?bRez.classList.remove("hide"):bRez.classList.add("hide");
  const stockBas=STOCK.filter(s=>s.qte<=s.seuil).length;
  const bSt=document.getElementById("badge-stock");

function updateRecapCI(prix){
  const ch=CHAMBRES.find(c=>c.num===(editRezId||0)) ;
  const cinEl=document.getElementById("f-cin");
  const coutEl=document.getElementById("f-cout");
  if(!cinEl||!coutEl) return;
  const cin=cinEl.value, cout=coutEl.value;
  if(!cin||!cout) return;
  const n=Math.max(1,diffDays(cin,cout));
  // find prix from context
  const prixEl=document.querySelector("#modal-title");

function doCheckin(num){
  const client=document.getElementById("f-client")?.value?.trim();
  const cin=document.getElementById("f-cin")?.value;
  const cout=document.getElementById("f-cout")?.value;
  const emp=document.getElementById("f-emp")?.value||EMPLOYES[0];

  const n=Math.max(1,diffDays(cin,cout));
  const ch=CHAMBRES.find(c=>c.num===num);
  addTx({type:"Chambre",desc:`Ch.${num} — ${client} (${n} nuit${n>1?"s":""})`,montant:ch.prix*n,employe:emp,date:today()});
  ch.statut="occupée"; ch.client=client; ch.checkIn=cin; ch.checkOut=cout;
  closeModal(); renderAll();
}

function doCheckout(num){
  if(!confirm(`Check-out chambre ${num} ?`)) return;
  const ch=CHAMBRES.find(c=>c.num===num);
  ch.statut="libre"; delete ch.client; delete ch.checkIn; delete ch.checkOut;
  renderAll();
}

function toggleMaint(num){
  const ch=CHAMBRES.find(c=>c.num===num);
  ch.statut=ch.statut==="maintenance"?"libre":"maintenance";
  renderAll();
}

function saveRez(){
  const client=document.getElementById("rf-client")?.value?.trim();
  const chambre=parseInt(document.getElementById("rf-chambre")?.value);
  const cin=document.getElementById("rf-cin")?.value;
  const cout=document.getElementById("rf-cout")?.value;
  if(!client||!chambre||!cin||!cout){alert("Remplis les champs obligatoires.");return;}
  if(new Date(cout)<=new Date(cin)){alert("La date de départ doit être après l'arrivée.");return;}
  const ch=CHAMBRES.find(c=>c.num===chambre);
  const nuits=Math.max(1,diffDays(cin,cout));
  const montantTotal=ch.prix*nuits;
  const acompte=document.getElementById("rf-acompte")?.value||"";
  const rez={
    id:editRezId||Date.now(), client, chambre, checkIn:cin, checkOut:cout,
    tel:document.getElementById("rf-tel")?.value||"",
    email:document.getElementById("rf-email")?.value||"",
    source:document.getElementById("rf-source")?.value||SOURCES[0],
    statut:document.getElementById("rf-statut")?.value||"confirmée",
    employe:document.getElementById("rf-emp")?.value||EMPLOYES[0],
    notes:document.getElementById("rf-notes")?.value||"",
    acompte, nuits, montantTotal
  };
  if(editRezId){
    const idx=reservations.findIndex(r=>r.id===editRezId);
    reservations[idx]=rez;
  } else {
    reservations.unshift(rez);
    if(parseInt(acompte)>0) addTx({type:"Chambre",desc:`Acompte — Ch.${chambre} · ${client}`,montant:parseInt(acompte),employe:rez.employe,date:today()});
  }
  closeModal(); renderAll();
}

// ── CALENDRIER ────────────────────────────────────────────────────
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){
  document.getElementById("cal-title").textContent=`${MOIS[calM]} ${calY}`;
  const firstDay=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const rezMap={};
  reservations.filter(r=>r.statut!=="annulée").forEach(r=>{
    let cur=r.checkIn;
    while(cur<r.checkOut){
      const d=new Date(cur+"T12:00:00");
      if(d.getFullYear()===calY&&d.getMonth()===calM){
        const day=d.getDate(); if(!rezMap[day]) rezMap[day]=0; rezMap[day]++;
      }
      cur=addDays(cur,1);
    }
  });
  const todayStr=today();
  const blanks=firstDay===0?6:firstDay-1;
  let html=["D","L","M","M","J","V","S"].map(j=>`<div class="cal-day-lbl">${j}</div>`).join("");
  for(let i=0;i<blanks;i++) html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isT=ds===todayStr; const occ=rezMap[d]||0;
    html+=`<div class="cal-day ${isT?"today":occ>0?"occ":""}">
      <div class="d-num">${d}</div>
      ${occ>0?`<div class="d-occ">${occ}ch.</div>`:""}
    </div>`;
  }
  document.getElementById("cal-grid").innerHTML=html;
}

// ── BAR / RESTAURANT ──────────────────────────────────────────────
function renderBar(){
  // Cats
  const cats=["Tous",...new Set(MENU.map(m=>m.cat))];
  document.getElementById("bar-cats").innerHTML=cats.map(c=>`<button class="filtre-btn ${c===barCat?"active":""}" onclick="setBarCat('${c}',this)">${c}</button>`).join("");
  // Menu
  const items=barCat==="Tous"?MENU:MENU.filter(m=>m.cat===barCat);
  document.getElementById("menu-grid").innerHTML=items.map(item=>`
    <div class="menu-item" onclick="addCmd(${item.id})">
      <div><div style="font-weight:600;font-size:13px">${item.nom}</div><div style="font-size:12px;color:#059669;font-weight:700">${fmt(item.prix)}</div></div>
      <span class="plus">+</span>
    </div>`).join("");
  renderCommande();
}

function setBarCat(c,btn){
  barCat=c;
  document.querySelectorAll("#bar-cats .filtre-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderBar();
}

function addCmd(id){
  const item=MENU.find(m=>m.id===id);
  const ex=commande.find(c=>c.id===id);
  if(ex) ex.qte++;
  else commande.push({...item,qte:1});
  renderCommande();
}
function remCmd(id){
  const ex=commande.find(c=>c.id===id);
  if(!ex) return;
  ex.qte--;
  if(ex.qte<=0) commande=commande.filter(c=>c.id!==id);
  renderCommande();
}
function renderCommande(){
  const box=document.getElementById("cmd-box");
  if(!commande.length){box.classList.add("hide");return;}
  box.classList.remove("hide");
  const total=commande.reduce((s,c)=>s+c.prix*c.qte,0);
  document.getElementById("cmd-items").innerHTML=commande.map(c=>`
    <div class="cmd-row">
      <span style="font-size:13px">${c.nom}</span>
      <div class="cmd-ctrl">
        <button class="cmd-btn" onclick="remCmd(${c.id})">−</button>
        <span style="font-weight:700;min-width:16px;text-align:center">${c.qte}</span>
        <button class="cmd-btn" onclick="addCmd(${c.id})">+</button>
        <span style="font-size:13px;font-weight:700;color:#5b21b6;min-width:65px;text-align:right">${fmt(c.prix*c.qte)}</span>
      </div>
    </div>`).join("");
  document.getElementById("cmd-total-amt").textContent=fmt(total);
}
function validerCommande(){
  if(!commande.length) return;
  const table=document.getElementById("bar-table").value;
  const emp=document.getElementById("bar-employe").value;
  const total=commande.reduce((s,c)=>s+c.prix*c.qte,0);
  const desc=`${table?table+" — ":""}${commande.map(c=>`${c.nom}×${c.qte}`).join(", ")}`;
  addTx({type:"Restaurant",desc,montant:total,employe:emp,date:today()});
  const heure=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  barHisto.unshift({table,items:[...commande],total,heure});
  if(barHisto.length>10) barHisto.pop();
  commande=[];
  document.getElementById("bar-table").value="";
  renderCommande();
  const h=document.getElementById("bar-histo");
  h.innerHTML=`<h4 style="color:#374151;margin-bottom:8px;margin-top:4px">Commandes du jour</h4>`+barHisto.map(x=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between"><span style="font-weight:600;font-size:13px">${x.table||"Comptoir"} · ${x.heure}</span><span style="font-weight:800;color:#059669">${fmt(x.total)}</span></div>
      <div style="font-size:11px;color:#6b7280;margin-top:3px">${x.items.map(i=>`${i.nom}×${i.qte}`).join(", ")}</div>
    </div>`).join("");
  renderCaisse();
}

// ── CAISSE ────────────────────────────────────────────────────────
function addTx(tx){transactions.unshift({...tx,id:Date.now()});renderCaisse();updateHeader();}

function renderCaisse(){
  const todayStr=today();
  const mois=todayStr.slice(0,7);
  const todayTx=transactions.filter(t=>t.date===todayStr);
  const totalJ=todayTx.reduce((s,t)=>s+t.montant,0);
  const totalM=transactions.filter(t=>t.date?.startsWith(mois)).reduce((s,t)=>s+t.montant,0);
  document.getElementById("c-jour").textContent=fmt(totalJ);
  document.getElementById("c-jour-nb").textContent=`${todayTx.length} transaction(s)`;
  document.getElementById("c-mois").textContent=fmt(totalM);
  const byType=["Chambre","Restaurant","Bar","Divers"].map(tp=>({tp,total:transactions.filter(t=>t.type===tp&&t.date?.startsWith(mois)).reduce((s,t)=>s+t.montant,0)})).filter(x=>x.total>0);
  document.getElementById("type-chips").innerHTML=byType.map(({tp,total})=>`<div class="type-chip" style="background:${typeColors[tp]||'#f3f4f6'}"><div class="lbl">${tp}</div><div class="val">${fmt(total)}</div></div>`).join("");
  document.getElementById("tx-list").innerHTML=transactions.slice(0,60).map(t=>`
    <div class="tx-row" style="background:${typeColors[t.type]||'#f9fafb'}">
      <div><div class="tx-desc">${t.desc}</div><div class="tx-meta">${t.type} · ${t.employe} · ${fmtDate(t.date)}</div></div>
      <div class="tx-amt">${fmt(t.montant)}</div>
    </div>`).join("");
}

function openCaisseForm(){
  openModal("Nouvelle recette",`
    <div class="form-group"><label>Type</label><select id="cf-type">${opt(["Chambre","Restaurant","Bar","Divers"])}</select></div>
    <div class="form-group"><label>Description *</label><input id="cf-desc" placeholder="ex: Table 3 — déjeuner"/></div>
    <div class="form-group"><label>Montant (F) *</label><input type="number" id="cf-montant" placeholder="0"/></div>
    <div class="form-group"><label>Encaissé par</label><select id="cf-emp">${opt(EMPLOYES)}</select></div>
    <div class="form-group"><label>Date</label><input type="date" id="cf-date" value="${today()}"/></div>
    <button class="btn btn-green btn-full" onclick="saveCaisse()">✅ Enregistrer</button>
  `);
}
function saveCaisse(){
  const desc=document.getElementById("cf-desc")?.value?.trim();
  const montant=parseInt(document.getElementById("cf-montant")?.value);
  if(!desc||!montant){alert("Remplis les champs obligatoires.");return;}
  addTx({type:document.getElementById("cf-type")?.value||"Divers",desc,montant,employe:document.getElementById("cf-emp")?.value||EMPLOYES[0],date:document.getElementById("cf-date")?.value||today()});
  closeModal();
}

// ── CLIENTS ───────────────────────────────────────────────────────
function filterClients(v){clSearch=v;renderClients();}
function renderClients(){
  const map={};
  [...transactions.filter(t=>t.type==="Chambre"),...reservations].forEach(r=>{
    const nom=r.client||r.desc?.split("—")[1]?.split("(")[0]?.trim();
    if(!nom) return;
    if(!map[nom]) map[nom]={nom,sejours:0,total:0,tel:"",actif:false};
    map[nom].sejours++; map[nom].total+=(r.montantTotal||r.montant||0);
    if(r.statut==="check-in") map[nom].actif=true;
    if(r.tel&&!map[nom].tel) map[nom].tel=r.tel;
  });
  const list=Object.values(map).filter(c=>c.nom?.toLowerCase().includes((clSearch||"").toLowerCase())).sort((a,b)=>b.total-a.total);
  document.getElementById("cl-list").innerHTML=list.length===0
    ?`<div style="text-align:center;color:#9ca3af;padding:40px">Aucun client enregistré</div>`
    :list.map(c=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:15px">👤 ${c.nom}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:3px">${c.sejours} séjour${c.sejours>1?"s":""}${c.tel?` · 📞 ${c.tel}`:""}${c.actif?` <span style="background:#d1fae5;color:#065f46;padding:1px 8px;border-radius:10px;font-size:11px">En séjour</span>`:""}</div>
        </div>
        <div style="font-weight:800;color:#059669;font-size:15px">${fmt(c.total)}</div>
      </div>
    </div>`).join("");
}

// ── STOCK ─────────────────────────────────────────────────────────
function renderStock(){
  const alertes=STOCK.filter(s=>s.qte<=s.seuil);
  document.getElementById("stock-alertes").innerHTML=alertes.length?`
    <div class="alerte alerte-crimson" style="margin-bottom:14px">
      <h4>🚨 Stock bas (${alertes.length})</h4>
      ${alertes.map(s=>`<p>• ${s.nom}: <strong>${s.qte} ${s.unite}</strong></p>`).join("")}
    </div>`:"";
  document.getElementById("stock-list").innerHTML=STOCK.map(s=>{
    const pct=Math.min(100,(s.qte/Math.max(s.seuil*3,1))*100);
    const bas=s.qte<=s.seuil;
    return `<div class="card" onclick="openStockEdit(${s.id})" style="cursor:pointer;${bas?"border-color:#fecdd3;background:#fff1f2":""}">
      <div style="display:flex;justify-content:space-between;margin-bottom:7px">
        <span style="font-weight:600;font-size:14px">${s.nom}</span>
        <span style="font-weight:800;font-size:14px;color:${bas?"#be123c":"#059669"}">${s.qte} ${s.unite}</span>
      </div>
      <div class="stock-bar"><div class="stock-fill" style="width:${pct}%;background:${bas?"#ef4444":"#22c55e"}"></div></div>
      <div style="font-size:11px;color:#9ca3af;margin-top:2px">Seuil: ${s.seuil} ${s.unite}</div>
    </div>`;
  }).join("");
  updateHeader();
}

function openStockForm(){
  editStockId=null;
  openModal("Nouvel article",`
    <div class="form-group"><label>Nom *</label><input id="sf-nom" placeholder="ex: Savon de bain"/></div>
    <div class="form-row">
      <div class="form-group"><label>Quantité</label><input type="number" id="sf-qte" value="0"/></div>
      <div class="form-group"><label>Seuil d'alerte</label><input type="number" id="sf-seuil" value="0"/></div>
    </div>
    <div class="form-group"><label>Unité</label><input id="sf-unite" value="pcs" placeholder="pcs, kg, L..."/></div>
    <button class="btn btn-dark btn-full" onclick="saveStock()">✅ Enregistrer</button>
  `);
}
function openStockEdit(id){
  editStockId=id;
  const s=STOCK.find(x=>x.id===id);
  openModal(`Modifier — ${s.nom}`,`
    <div class="form-group"><label>Nom</label><input id="sf-nom" value="${s.nom}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Quantité</label><input type="number" id="sf-qte" value="${s.qte}"/></div>
      <div class="form-group"><label>Seuil d'alerte</label><input type="number" id="sf-seuil" value="${s.seuil}"/></div>
    </div>
    <div class="form-group"><label>Unité</label><input id="sf-unite" value="${s.unite}"/></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-dark btn-full" onclick="saveStock()">✅ Enregistrer</button>
      <button class="btn btn-out-red" onclick="deleteStock(${id})">🗑</button>
    </div>
  `);
}
function saveStock(){
  const nom=document.getElementById("sf-nom")?.value?.trim();
  if(!nom){alert("Entre un nom.");return;}
  const obj={nom,qte:parseInt(document.getElementById("sf-qte")?.value)||0,seuil:parseInt(document.getElementById("sf-seuil")?.value)||0,unite:document.getElementById("sf-unite")?.value||"pcs"};
  if(editStockId){Object.assign(STOCK.find(s=>s.id===editStockId),obj);}
  else{STOCK.push({...obj,id:Date.now()});}
  closeModal(); renderStock();
}
function deleteStock(id){
  if(!confirm("Supprimer cet article ?")) return;
  STOCK=STOCK.filter(s=>s.id!==id);
  closeModal(); renderStock();
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(title,body){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=body;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");}
function closeModalBg(e){if(e.target===document.getElementById("modal-bg")) closeModal();}

// ── START ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
