<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.cmdtot{border-top:1.5px solid #ddd6fe;margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;font-weight:800}
.sbar{background:#f3f4f6;border-radius:4px;height:6px;margin:6px 0 2px}
.sfill{height:100%;border-radius:4px}
.dr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.dk{color:#6b7280}.dv{font-weight:700;text-align:right;max-width:60%}
.sinput{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 11px;font-size:14px;outline:none;background:#fff;margin-bottom:12px}
.calnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.calnav button{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 12px;color:#374151}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdlbl{text-align:center;font-size:10px;font-weight:700;color:#9ca3af;padding:4px 0}
.cday{border-radius:8px;min-height:42px;padding:5px 3px;text-align:center;border:1.5px solid #f0f0f0;background:#f9fafb}

.chsg{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:6px;max-height:175px;overflow-y:auto;padding:2px}
.chsb{border-radius:8px;padding:6px 4px;text-align:center;border:2px solid #e5e7eb;background:#fff;cursor:pointer}
.chsb.sel{border-color:#059669;background:#d1fae5}
.chsb.tk{opacity:.4;cursor:not-allowed}
.chsb .cn{font-size:13px;font-weight:800}.chsb .ct{font-size:9px;color:#6b7280}
.chsb .cp{font-size:10px;font-weight:700;color:#9ca3af}.chsb.sel .cp{color:#059669}
.loading{text-align:center;padding:40px;color:#9ca3af}
.whats-msg{width:100%;border:1.5px solid #bbf7d0;border-radius:8px;padding:9px;font-size:13px;min-height:80px;outline:none;background:#fff;resize:vertical}
</style>

<body>

<div id="syncbar">⏳ Connexion...</div>

<div id="header">
  <small>Fidélie Hôtel · Kribi</small>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
    <h1>Gestion Hôtel</h1>

      <div style="font-size:10px;opacity:.6" id="hdate"></div>

</div>

<div id="content">
  <div class="page active" id="page-chambres">
    <div class="stats">
      <div class="stat" style="background:#d1fae5"><div class="val" style="color:#065f46" id="slibres">—</div><div class="lbl" style="color:#065f46">Libres</div></div>
      <div class="stat" style="background:#fee2e2"><div class="val" style="color:#991b1b" id="socc">—</div><div class="lbl" style="color:#991b1b">Occupées</div></div>
      <div class="stat" style="background:#ede9fe"><div class="val" style="color:#5b21b6">27</div><div class="lbl" style="color:#5b21b6">Total</div></div>
    </div>
    <div class="filtres" id="chfiltres">
      <button class="fb active" onclick="setCF('tous',this)">Toutes</button>
      <button class="fb" onclick="setCF('libre',this)">Libre</button>
      <button class="fb" onclick="setCF('occupée',this)">Occupée</button>
      <button class="fb" onclick="setCF('maintenance',this)">Maintenance</button>

    <div class="ch-grid" id="chgrid"><div class="loading">⏳ Connexion Firebase...</div></div>
  </div>

  <div class="page" id="page-reservations">
    <div id="rezalerts"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button class="btn bgreen" onclick="openRezForm(null)">+ Nouvelle réservation</button>
      <div style="margin-left:auto;display:flex;gap:4px">
        <button class="btn bdark bsm" id="vbl" onclick="setRV('liste')">📋</button>

        <button class="fb" onclick="setRF('confirmée',this)">Confirmée</button>
        <button class="fb" onclick="setRF('en attente',this)">En attente</button>
        <button class="fb" onclick="setRF('check-in',this)">Check-in</button>
        <button class="fb" onclick="setRF('check-out',this)">Check-out</button>

      </div>

    </div>
  </div>

  <div class="page" id="page-bar">

      <div class="fg"><label>Serveur</label><select id="baremp"></select></div>
    </div>
    <div class="filtres" id="barcats"></div>
    <div class="mgrid" id="menugrid"></div>
    <div id="cmdbox" class="hide">
      <div class="cmdbox">
        <div style="font-weight:700;color:#5b21b6;margin-bottom:10px">Commande en cours</div>
        <div id="cmditems"></div>
        <div class="cmdtot"><span>TOTAL</span><span id="cmdtotamt" style="color:#059669"></span></div>
        <button class="btn bgreen bfull" style="margin-top:10px" onclick="validerCmd()">Valider et Encaisser</button>

    </div>

  </div>

    <div id="stkalerts"></div>
    <button class="btn bdark bfull" style="margin-bottom:12px" onclick="openStockForm()">+ Nouvel article</button>
    <div id="stklist"><div class="loading">Chargement...</div></div>
  </div>
</div>

<div id="mbg" onclick="closeMBG(event)">

    <div id="mhdr"><h3 id="mtitle"></h3><button id="mcls" onclick="closeModal()">x</button></div>
    <div id="mbody"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCMspEIcWGi6dYVX7aNZScHQYKPPlRXY50",
  authDomain:"fidelie-hotel.firebaseapp.com",
  projectId:"fidelie-hotel",
  storageBucket:"fidelie-hotel.firebasestorage.app",
  messagingSenderId:"697423263168",
  appId:"1:697423263168:web:67e0297cd05c6a37ee0425"
});
var db=firebase.firestore();

var CH_NUMS=Array.from({length:27},function(_,i){return 101+i;});
var PRIX_DEF={117:45000,121:20000};
var TYPES_CH={117:"Suite",121:"VIP"};
function getPD(n){return PRIX_DEF[n]||15000;}
function getTP(n){return TYPES_CH[n]||"Standard";}
var EMP=["Ambroise","Dorette","Stephane","Femme de chambre"];
var SRC=["Direct Telephone","WhatsApp","Site web","Walk-in","Agence"];
var MENU=[
  {id:1,cat:"Plats",nom:"Poulet DG",prix:3500},
  {id:2,cat:"Plats",nom:"Poisson braise",prix:4000},
  {id:3,cat:"Plats",nom:"Ndole",prix:2500},
  {id:4,cat:"Plats",nom:"Eru",prix:2500},
  {id:5,cat:"Plats",nom:"Riz saute",prix:1500},
  {id:6,cat:"Boissons",nom:"Biere 33cl",prix:800},
  {id:7,cat:"Boissons",nom:"Eau minerale",prix:500},
  {id:8,cat:"Boissons",nom:"Jus naturel",prix:1000},
  {id:9,cat:"Boissons",nom:"Cocktail",prix:2000},
  {id:10,cat:"Boissons",nom:"Vin rouge",prix:3000}
];
var STK_DEF=[
  {nom:"Savon de bain",qte:80,seuil:20,unite:"pcs"},
  {nom:"Shampoing",qte:60,seuil:15,unite:"pcs"},
  {nom:"Papier toilette",qte:120,seuil:30,unite:"roul."},
  {nom:"Detergent linge",qte:25,seuil:5,unite:"kg"},
  {nom:"Eau de Javel",qte:15,seuil:3,unite:"L"},
  {nom:"Serviettes bain",qte:55,seuil:20,unite:"pcs"},
  {nom:"Draps",qte:40,seuil:15,unite:"jeux"},
  {nom:"Desinfectant",qte:8,seuil:2,unite:"L"}
];
var TC={Chambre:"#dbeafe",Restaurant:"#d1fae5",Bar:"#ede9fe",Divers:"#f3f4f6"};
var MOIS=["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];
var BC={libre:"b-libre",occupee:"b-occ",maintenance:"b-maint",confirmee:"b-conf","en attente":"b-att",annulee:"b-ann","check-in":"b-cin","check-out":"b-cout"};

var CHAMBRES={},REZ={},TX={},STK={};
var CMD=[],HISTO=[];
var cF="tous",rF="tous",rS="",clS="",barCat="Tous";
var calY=new Date().getFullYear(),calM=new Date().getMonth();
var editRezId=null,editStkId=null,rezView="liste";

function fmt(n){return Number(n).toLocaleString("fr-FR")+" F";}
function tod(){return new Date().toISOString().split("T")[0];}
function fmtD(d){if(!d)return "—";return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"});}
function diff(a,b){return Math.ceil((new Date(b)-new Date(a))/86400000);}
function addD(d,n){var r=new Date(d+"T12:00:00");r.setDate(r.getDate()+n);return r.toISOString().split("T")[0];}
function opt(a,s){s=s||"";return a.map(function(e){return "<option value='"+e+"'"+(e===s?" selected":"")+">"+e+"</option>";}).join("");}
function bdg(s){var cls=BC[s]||"b-att";return "<span class='bs "+cls+"'>"+s+"</span>";}
function getSt(num){
  var found=false;
  Object.keys(REZ).forEach(function(k){if(REZ[k].chambre===num&&REZ[k].statut==="check-in")found=true;});
  if(found)return "occupee";
  return (CHAMBRES[num]&&CHAMBRES[num].statut)||"libre";
}
function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function gi(id){return parseInt(gv(id))||0;}

function setSB(s){
  var b=document.getElementById("syncbar");
  if(s==="ok"){b.className="";b.textContent="Synchronise en temps reel";}
  else if(s==="off"){b.className="off";b.textContent="Hors ligne";}
  else{b.className="err";b.textContent="Erreur connexion";}
}
window.addEventListener("online",function(){setSB("ok");});
window.addEventListener("offline",function(){setSB("off");});

function startListeners(){
  db.collection("chambres").onSnapshot(function(snap){
    snap.forEach(function(d){CHAMBRES[d.id]=Object.assign({},d.data(),{id:d.id});});
    CH_NUMS.forEach(function(n){if(!CHAMBRES[n])db.collection("chambres").doc(String(n)).set({num:n,statut:"libre"});});
    renderCH();upHdr();setSB("ok");
  },function(){setSB("err");});

  db.collection("reservations").orderBy("createdAt","desc").onSnapshot(function(snap){
    REZ={};snap.forEach(function(d){REZ[d.id]=Object.assign({},d.data(),{id:d.id});});
    renderREZ();renderClients();upHdr();
  },function(){setSB("err");});

  db.collection("transactions").orderBy("createdAt","desc").onSnapshot(function(snap){
    TX={};snap.forEach(function(d){TX[d.id]=Object.assign({},d.data(),{id:d.id});});
    renderCaisse();
  },function(){setSB("err");});

  db.collection("stock").onSnapshot(function(snap){
    STK={};snap.forEach(function(d){STK[d.id]=Object.assign({},d.data(),{id:d.id});});
    if(Object.keys(STK).length===0)STK_DEF.forEach(function(s){db.collection("stock").add(Object.assign({},s,{createdAt:Date.now()}));});
    renderStk();upHdr();
  },function(){setSB("err");});
}

  return db.collection("reservations").add(Object.assign({},data,{createdAt:Date.now()}));
}
function addTX(data){return db.collection("transactions").add(Object.assign({},data,{createdAt:Date.now()}));}
function saveSTK(id,data){
  if(id)return db.collection("stock").doc(String(id)).set(Object.assign({},data,{updatedAt:Date.now()}),{merge:true});

function doCI(num){

  var emp=gv("fci-emp")||EMP[0],prix=gi("fci-prix")||getPD(num);

  saveCH(num,{statut:"occupee",client:cl,tel:tel,ville:ville,piece:piece,checkIn:ci,checkOut:co,prixNuit:prix});
  closeModal();
}

function doCO(num){
  var ra=null;
  Object.values(REZ).forEach(function(r){if(r.chambre===num&&r.statut==="check-in")ra=r;});
  var ch=CHAMBRES[num]||{};
  var client=ra?ra.client:(ch.client||"Ch."+num);
  var tel=ra?ra.tel:(ch.tel||"");
  if(!confirm("Check-out chambre "+num+" - "+client+" ?"))return;
  saveCH(num,{statut:"libre",client:"",tel:"",ville:"",piece:"",checkIn:"",checkOut:"",prixNuit:""});
  if(ra)updREZSt(ra.id,"check-out");
  if(tel)envoyerMerci(client,tel,num);

function saveRez(){

    source:gv("rf-src")||SRC[0],statut:gv("rf-st")||"confirmee",
    employe:gv("rf-emp")||EMP[0],notes:gv("rf-notes"),acompte:ac};

function renderCal(){
  document.getElementById("caltitle").textContent=MOIS[calM]+" "+calY;
  var fd=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  var rm={};
  Object.values(REZ).filter(function(r){return r.statut!=="annulee";}).forEach(function(r){
    var cur=r.checkIn;
    while(cur<r.checkOut){
      var d=new Date(cur+"T12:00:00");
      if(d.getFullYear()===calY&&d.getMonth()===calM){var day=d.getDate();if(!rm[day])rm[day]=0;rm[day]++;}
      cur=addD(cur,1);
    }
  });
  var ts=tod(),bl=fd===0?6:fd-1;
  var h=["D","L","M","M","J","V","S"].map(function(j){return "<div class='cdlbl'>"+j+"</div>";}).join("");
  for(var i=0;i<bl;i++)h+="<div></div>";
  for(var d=1;d<=days;d++){
    var ds=calY+"-"+String(calM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var it=ds===ts,occ=rm[d]||0;
    h+="<div class='cday "+(it?"tod":occ>0?"cocc":"")+"'><div class='dn'>"+d+"</div>"+(occ>0?"<div class='do'>"+occ+"ch.</div>":"")+"</div>";
  }
  document.getElementById("calgrid").innerHTML=h;
}

function renderBar(){
  var cats=["Tous"];
  MENU.forEach(function(m){if(cats.indexOf(m.cat)<0)cats.push(m.cat);});
  document.getElementById("barcats").innerHTML=cats.map(function(c){
    return "<button class='fb "+(c===barCat?"active":"")+"' onclick=\"setBC('"+c+"',this)\">"+c+"</button>";
  }).join("");
  var items=barCat==="Tous"?MENU:MENU.filter(function(m){return m.cat===barCat;});
  document.getElementById("menugrid").innerHTML=items.map(function(item){
    return "<div class='mitem' onclick='addCmd("+item.id+")'><div><div style='font-weight:600;font-size:13px'>"+item.nom+"</div><div style='font-size:12px;color:#059669;font-weight:700'>"+fmt(item.prix)+"</div></div><span class='plus'>+</span></div>";
  }).join("");
  renderCmd();
}
function setBC(c,b){barCat=c;document.querySelectorAll("#barcats .fb").forEach(function(x){x.classList.remove("active");});b.classList.add("active");renderBar();}
function addCmd(id){var it=MENU.filter(function(m){return m.id===id;})[0];var ex=CMD.filter(function(c){return c.id===id;})[0];if(ex)ex.qte++;else CMD.push({id:it.id,nom:it.nom,prix:it.prix,qte:1});renderCmd();}
function remCmd(id){var ex=CMD.filter(function(c){return c.id===id;})[0];if(!ex)return;ex.qte--;if(ex.qte<=0)CMD=CMD.filter(function(c){return c.id!==id;});renderCmd();}
function renderCmd(){
  var box=document.getElementById("cmdbox");
  if(!CMD.length){box.classList.add("hide");return;}
  box.classList.remove("hide");
  var tot=CMD.reduce(function(s,c){return s+c.prix*c.qte;},0);
  document.getElementById("cmditems").innerHTML=CMD.map(function(c){
    return "<div class='cmdrow'><span style='font-size:13px'>"+c.nom+"</span><div class='cmdctl'><button class='cmdbtn' onclick='remCmd("+c.id+")'>-</button><span style='font-weight:700;min-width:16px;text-align:center'>"+c.qte+"</span><button class='cmdbtn' onclick='addCmd("+c.id+")'>+</button><span style='font-size:13px;font-weight:700;color:#5b21b6;min-width:65px;text-align:right'>"+fmt(c.prix*c.qte)+"</span></div></div>";
  }).join("");
  document.getElementById("cmdtotamt").textContent=fmt(tot);
}
function validerCmd(){
  if(!CMD.length)return;
  var table=gv("bartable"),emp=gv("baremp");
  var tot=CMD.reduce(function(s,c){return s+c.prix*c.qte;},0);
  addTX({type:"Restaurant",desc:(table?table+" - ":"")+CMD.map(function(c){return c.nom+"x"+c.qte;}).join(", "),montant:tot,employe:emp,date:tod()});
  var h=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  HISTO.unshift({table:table,items:CMD.map(function(c){return{nom:c.nom,qte:c.qte};}),total:tot,heure:h});
  if(HISTO.length>10)HISTO.pop();
  CMD=[];document.getElementById("bartable").value="";renderCmd();
  document.getElementById("barhisto").innerHTML="<h4 style='color:#374151;margin-bottom:8px;margin-top:4px'>Commandes du jour</h4>"+HISTO.map(function(x){
    return "<div class='card'><div style='display:flex;justify-content:space-between'><span style='font-weight:600;font-size:13px'>"+(x.table||"Comptoir")+" - "+x.heure+"</span><span style='font-weight:800;color:#059669'>"+fmt(x.total)+"</span></div><div style='font-size:11px;color:#6b7280;margin-top:3px'>"+x.items.map(function(i){return i.nom+"x"+i.qte;}).join(", ")+"</div></div>";
  }).join("");
}

function renderCaisse(){
  var ts=tod(),ms=ts.slice(0,7),txArr=Object.values(TX);
  var ttx=txArr.filter(function(t){return t.date===ts;});
  document.getElementById("cjour").textContent=fmt(ttx.reduce(function(s,t){return s+t.montant;},0));
  document.getElementById("cjournb").textContent=ttx.length+" transaction(s)";
  document.getElementById("cmois").textContent=fmt(txArr.filter(function(t){return t.date&&t.date.slice(0,7)===ms;}).reduce(function(s,t){return s+t.montant;},0));
  var bt=["Chambre","Restaurant","Bar","Divers"].map(function(tp){
    return {tp:tp,total:txArr.filter(function(t){return t.type===tp&&t.date&&t.date.slice(0,7)===ms;}).reduce(function(s,t){return s+t.montant;},0)};
  }).filter(function(x){return x.total>0;});
  document.getElementById("tchips").innerHTML=bt.map(function(x){return "<div class='tchip' style='background:"+(TC[x.tp]||"#f3f4f6")+"'><div class='tl'>"+x.tp+"</div><div class='tv'>"+fmt(x.total)+"</div></div>";}).join("");
  document.getElementById("txlist").innerHTML=txArr.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);}).slice(0,60).map(function(t){
    return "<div class='txrow' style='background:"+(TC[t.type]||"#f9fafb")+"'><div><div class='td'>"+t.desc+"</div><div class='tm'>"+t.type+" - "+t.employe+" - "+fmtD(t.date)+"</div></div><div class='ta'>"+fmt(t.montant)+"</div></div>";
  }).join("");
}
function openCaisseForm(){
  var html="<div class='fg'><label>Type</label><select id='cf-t'>"+opt(["Chambre","Restaurant","Bar","Divers"])+"</select></div>";
  html+="<div class='fg'><label>Description *</label><input id='cf-d' placeholder='Table 3 dejeuner'/></div>";
  html+="<div class='fg'><label>Montant (F) *</label><input type='number' id='cf-m' placeholder='0'/></div>";
  html+="<div class='fg'><label>Encaisse par</label><select id='cf-e'>"+opt(EMP)+"</select></div>";
  html+="<div class='fg'><label>Date</label><input type='date' id='cf-dt' value='"+tod()+"'/></div>";
  html+="<button class='btn bgreen bfull' onclick='saveCaisse()'>Enregistrer</button>";
  openModal("Nouvelle recette",html);
}
function saveCaisse(){
  var d=gv("cf-d").trim(),m=gi("cf-m");
  if(!d||!m){alert("Description et montant obligatoires.");return;}
  addTX({type:gv("cf-t")||"Divers",desc:d,montant:m,employe:gv("cf-e")||EMP[0],date:gv("cf-dt")||tod()});
  closeModal();
}

function filterCl(v){clS=v;renderClients();}
function renderClients(){
  var map={};
  Object.values(TX).filter(function(t){return t.type==="Chambre";}).concat(Object.values(REZ)).forEach(function(r){
    var nom=r.client||(r.desc&&r.desc.split("-")[1]&&r.desc.split("-")[1].split("(")[0].trim());
    if(!nom)return;
    if(!map[nom])map[nom]={nom:nom,sejours:0,total:0,tel:"",ville:"",actif:false};
    map[nom].sejours++;map[nom].total+=(r.montantTotal||r.montant||0);
    if(r.statut==="check-in")map[nom].actif=true;
    if(r.tel&&!map[nom].tel)map[nom].tel=r.tel;
    if(r.ville&&!map[nom].ville)map[nom].ville=r.ville;
  });
  var list=Object.values(map).filter(function(c){return c.nom&&c.nom.toLowerCase().indexOf((clS||"").toLowerCase())>=0;}).sort(function(a,b){return b.total-a.total;});
  if(!list.length){document.getElementById("cllist").innerHTML="<div style='text-align:center;color:#9ca3af;padding:40px'>Aucun client</div>";return;}
  document.getElementById("cllist").innerHTML=list.map(function(c){
    return "<div class='card'><div style='display:flex;justify-content:space-between;align-items:center'>"
      +"<div><div style='font-weight:700;font-size:15px'>"+c.nom+"</div>"
      +"<div style='font-size:12px;color:#6b7280;margin-top:3px'>"+c.sejours+" sejour"+(c.sejours>1?"s":"")+(c.tel?" - "+c.tel:"")+(c.ville?" - "+c.ville:"")
      +(c.actif?" <span style='background:#d1fae5;color:#065f46;padding:1px 8px;border-radius:10px;font-size:11px'>En sejour</span>":"")+"</div></div>"
      +"<div style='text-align:right'><div style='font-weight:800;color:#059669;font-size:15px'>"+fmt(c.total)+"</div>"
      +(c.tel?"<button class='btn bwhats bsm' style='margin-top:6px' onclick=\"envoyerMerci('"+c.nom+"','"+c.tel+"','')\">WhatsApp</button>":"")
      +"</div></div></div>";
  }).join("");
}

function renderStk(){
  var al=Object.values(STK).filter(function(s){return s.qte<=s.seuil;});
  document.getElementById("stkalerts").innerHTML=al.length?"<div class='alerte acr' style='margin-bottom:14px'><h4>Stock bas ("+al.length+")</h4>"+al.map(function(s){return "<p>"+s.nom+": "+s.qte+" "+s.unite+"</p>";}).join("")+"</div>":"";
  document.getElementById("stklist").innerHTML=Object.values(STK).map(function(s){
    var pct=Math.min(100,(s.qte/Math.max(s.seuil*3,1))*100),bas=s.qte<=s.seuil;
    return "<div class='card' onclick=\"openStkEdit('"+s.id+"')\" style='cursor:pointer;"+(bas?"border-color:#fecdd3;background:#fff1f2":"")+"'>"
      +"<div style='display:flex;justify-content:space-between;margin-bottom:7px'><span style='font-weight:600;font-size:14px'>"+s.nom+"</span><span style='font-weight:800;font-size:14px;color:"+(bas?"#be123c":"#059669")+"'>"+s.qte+" "+s.unite+"</span></div>"
      +"<div class='sbar'><div class='sfill' style='width:"+pct+"%;background:"+(bas?"#ef4444":"#22c55e")+"'></div></div>"
      +"<div style='font-size:11px;color:#9ca3af;margin-top:2px'>Seuil: "+s.seuil+" "+s.unite+"</div></div>";
  }).join("");
}
function openStockForm(){
  editStkId=null;
  var html="<div class='fg'><label>Nom *</label><input id='sf-n' placeholder='Savon de bain'/></div>";
  html+="<div class='frow'><div class='fg'><label>Quantite</label><input type='number' id='sf-q' value='0'/></div><div class='fg'><label>Seuil alerte</label><input type='number' id='sf-s' value='0'/></div></div>";
  html+="<div class='fg'><label>Unite</label><input id='sf-u' value='pcs' placeholder='pcs, kg, L...'/></div>";
  html+="<button class='btn bdark bfull' onclick='saveStk()'>Enregistrer</button>";
  openModal("Nouvel article",html);
}
function openStkEdit(id){
  editStkId=id;var s=STK[id];
  var html="<div class='fg'><label>Nom</label><input id='sf-n' value='"+s.nom+"'/></div>";
  html+="<div class='frow'><div class='fg'><label>Quantite</label><input type='number' id='sf-q' value='"+s.qte+"'/></div><div class='fg'><label>Seuil alerte</label><input type='number' id='sf-s' value='"+s.seuil+"'/></div></div>";
  html+="<div class='fg'><label>Unite</label><input id='sf-u' value='"+s.unite+"'/></div>";
  html+="<div style='display:flex;gap:8px'><button class='btn bdark bfull' onclick='saveStk()'>Enregistrer</button><button class='btn bor-red' onclick=\"delStk('"+id+"')\">Suppr.</button></div>";
  openModal("Modifier - "+s.nom,html);
}
function saveStk(){
  var nom=gv("sf-n").trim();if(!nom){alert("Entre un nom.");return;}
  saveSTK(editStkId,{nom:nom,qte:gi("sf-q"),seuil:gi("sf-s"),unite:gv("sf-u")||"pcs"});
  closeModal();
}
function delStk(id){if(!confirm("Supprimer cet article ?"))return;delSTK(id);closeModal();}

function openModal(title,body){
  document.getElementById("mtitle").textContent=title;
  document.getElementById("mbody").innerHTML=body;
  document.getElementById("mbg").classList.add("open");
}
function closeModal(){document.getElementById("mbg").classList.remove("open");}
function closeMBG(e){if(e.target===document.getElementById("mbg"))closeModal();}

document.getElementById("hdate").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
document.getElementById("baremp").innerHTML=opt(EMP);
renderBar();
startListeners();
</script>
